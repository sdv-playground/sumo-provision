# Full sumo-provision tower stack in containers — Tower 1 (sumo-ca), Tower 2
# (sumo-hub), and their backing services. Unlike docker-compose.yml (which runs
# ONLY postgres + minio, with the towers as host `cargo run` processes), this
# runs everything in Docker: nothing on the host but the daemon.
#
#   docker compose -f compose.towers.yml up --build     # bring the stack up
#   docker compose -f compose.towers.yml down           # stop (keep data)
#   docker compose -f compose.towers.yml down -v        # stop + wipe all state
#
# Fault-domain separation: Tower 1 and Tower 2 get SEPARATE Postgres INSTANCES
# (postgres-ca / postgres-hub), not just separate databases — a Tower 2
# compromise can't reach Tower 1's identity DB at all. Each postgres creates its
# own DB via POSTGRES_DB, so there's no manual `createdb` bootstrap step (the old
# host start.sh needed one). Key material + blobs persist in named volumes.
#
# Ports match the host flow: CA :8080, hub :8081, minter :9200, minio :9000/:9001.
# The minter (sovd-token-helper) lives in a sibling repo and needs a Tower-1
# delegate cert minted at startup — its container entrypoint does that bootstrap
# (wait for sumo-ca, POST /admin/workshop/delegate-cert, then start), so the full
# trust stack — including the token minter a device write requires — is in Docker.

name: sumo-towers

services:
  # ---- Tower 1 backing DB -------------------------------------------------
  postgres-ca:
    image: postgres:16
    environment:
      POSTGRES_USER: sumo
      POSTGRES_PASSWORD: dev-only-not-secret
      POSTGRES_DB: sumo_ca
    volumes:
      - ca-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumo -d sumo_ca"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Tower 2 backing DB -------------------------------------------------
  postgres-hub:
    image: postgres:16
    environment:
      POSTGRES_USER: sumo
      POSTGRES_PASSWORD: dev-only-not-secret
      POSTGRES_DB: sumo_hub
    volumes:
      - hub-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumo -d sumo_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- object store (Tower 2 blob backend, when it moves off FsBlobStore) --
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sumo
      MINIO_ROOT_PASSWORD: dev-only-not-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - minio-data:/data

  # ---- Tower 1 — identity (sumo-ca) ---------------------------------------
  sumo-ca:
    build:
      context: .
      dockerfile: Dockerfile
    image: sumo-provision/towers
    command: sumo-ca
    depends_on:
      postgres-ca:
        condition: service_healthy
    environment:
      SUMO_CA_BIND: "0.0.0.0:8080"
      DATABASE_URL: "postgres://sumo:dev-only-not-secret@postgres-ca:5432/sumo_ca"
      # Key material (3 CA roots) auto-generates on first run under these paths;
      # the ca-keys volume persists them across restarts.
      SUMO_CA_KEY: /keys/ca-authority.key
      SUMO_CA_CERT: /keys/ca-cert.der
      SUMO_IDENTITY_KEY: /keys/identity.key
      SUMO_IDENTITY_CERT: /keys/identity-cert.der
      SUMO_DELEGATION_KEY: /keys/delegation.key
      SUMO_DELEGATION_CERT: /keys/delegation-cert.der
      RUST_LOG: "info"
    ports:
      - "8080:8080"
    volumes:
      - ca-keys:/keys

  # ---- Tower 2 — software (sumo-hub) --------------------------------------
  sumo-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: sumo-provision/towers
    command: sumo-hub
    depends_on:
      postgres-hub:
        condition: service_healthy
    environment:
      SUMO_HUB_BIND: "0.0.0.0:8081"
      DATABASE_URL: "postgres://sumo:dev-only-not-secret@postgres-hub:5432/sumo_hub"
      SUMO_HUB_BLOB_DIR: /data/blobs
      # sw-authority signing key auto-generates on first run; persisted in hub-keys.
      SUMO_HUB_SIGNING_KEY: /keys/sw-authority.key
      RUST_LOG: "info"
    ports:
      - "8081:8081"
    volumes:
      - hub-keys:/keys
      - hub-blobs:/data

  # ---- workshop minter (sovd-token-helper) --------------------------------
  # The offboard JWT minter — issues the short-lived, boot-bound SOVD tokens a
  # device requires for a write (flash / commit / factory-reset). A DELEGATE of
  # Tower 1: its entrypoint waits for sumo-ca, mints itself a delegate leaf cert
  # (POST /admin/workshop/delegate-cert), then signs JWTs with it. Built from the
  # sibling sovd-token-helper checkout (a separate repo/submodule). depends_on is
  # plain (sumo-ca has no healthcheck); the entrypoint polls /healthz itself.
  minter:
    build:
      context: ../sovd-token-helper
      dockerfile: Dockerfile
    image: sumo-provision/minter
    depends_on:
      - sumo-ca
    environment:
      CA_URL: "http://sumo-ca:8080"
      SOVD_MINTER_PORT: "9200"
      # Dev operator bearer — matches up.sh's default; a real deployment gates
      # POST /mint on badge/smartcard/SSO instead.
      SOVD_MINTER_OPERATOR_TOKEN: "dev-workshop-operator"
      SOVD_MINTER_KID: "workshop-minter-1"
      SOVD_MINTER_ISSUER: "workshop-ca"
      MINTER_STATE_DIR: "/state"
    ports:
      - "9200:9200"
    volumes:
      - minter-state:/state

volumes:
  ca-db:
  hub-db:
  minio-data:
  ca-keys:
  hub-keys:
  hub-blobs:
  minter-state:
