name: fmt
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - run: cargo fmt --all -- --check
